{% extends "base.html" %}

{% block title %}Login - ManyChat Dashboard{% endblock %}

{% block body %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 30%, #312e81 70%, #0f172a 100%); position: relative; overflow: hidden;">
    <!-- Animated background elements -->
    <div style="position: absolute; width: 300px; height: 300px; background: rgba(99,102,241,0.1); border-radius: 50%; top: -50px; right: -80px; filter: blur(60px);"></div>
    <div style="position: absolute; width: 250px; height: 250px; background: rgba(139,92,246,0.1); border-radius: 50%; bottom: -40px; left: -60px; filter: blur(60px);"></div>
    
    <div style="background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: 20px; padding: 48px 40px; width: 420px; max-width: 92%; box-shadow: 0 25px 80px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); animation: fadeInUp 0.5s ease-out;">
        <div style="text-align: center; margin-bottom: 36px;">
            <div style="width: 64px; height: 64px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; box-shadow: 0 8px 24px rgba(99,102,241,0.4);">
                <i class="fas fa-chart-bar" style="font-size: 1.8rem; color: #fff;"></i>
            </div>
            <h1 style="font-size: 1.6rem; color: #0f172a; margin-bottom: 6px; font-weight: 800; letter-spacing: -0.5px;">ManyChat Dashboard</h1>
            <p style="color: #64748b; font-size: 0.9rem; font-weight: 400;">Sign in to manage your Page IDs</p>
        </div>

        {% if error %}
        <div class="alert alert-error" style="animation: slideDown 0.3s ease-out;">
            <i class="fas fa-exclamation-triangle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-group">
                <label for="username"><i class="fas fa-user" style="color: #6366f1; margin-right: 6px;"></i>Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock" style="color: #6366f1; margin-right: 6px;"></i>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword()" title="Show/Hide password">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 14px; font-size: 1rem; margin-top: 12px; border-radius: 12px;">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div style="margin-top: 28px; padding-top: 20px; border-top: 2px solid #f1f5f9; text-align: center;">
            <p style="font-size: 0.8rem; color: #94a3b8;"><i class="fas fa-shield-alt" style="margin-right: 4px;"></i> ManyChat Page IDs Management System</p>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
    }
}
</script>
{% endblock %}
